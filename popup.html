<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>薬歴AIナビゲーション</h1>
    <p class="description">AIプロバイダーとAPIキーを設定</p>

    <div class="form-group">
      <label>AIプロバイダー</label>
      <div class="provider-toggle">
        <button type="button" class="provider-btn active" data-provider="gemini">Gemini</button>
        <button type="button" class="provider-btn" data-provider="openai">OpenAI</button>
        <button type="button" class="provider-btn" data-provider="claude">Claude</button>
        <button type="button" class="provider-btn" data-provider="ollama">Ollama</button>
      </div>
    </div>

    <div class="form-group">
      <label for="apiKey" id="apiKeyLabel">APIキー</label>
      <input type="password" id="apiKey" placeholder="APIキーを入力">
      <p class="api-link" id="apiLink">
        <a href="https://aistudio.google.com/apikey" target="_blank" id="apiLinkAnchor">APIキーを取得する</a>
      </p>
    </div>

    <div class="form-group">
      <label>モデル</label>
      <div class="model-toggle" id="modelToggle"></div>
      <div id="ollamaModelArea" style="display:none;">
        <button type="button" id="fetchModelsBtn" class="fetch-models-btn">モデル一覧を取得</button>
        <div class="model-toggle ollama-model-toggle" id="ollamaModelToggle"></div>
      </div>
      <p class="model-hint" id="modelHint"></p>
    </div>

    <div class="form-group">
      <label>重視項目（複数選択可）</label>
      <div class="focus-items">
        <label class="checkbox-label"><input type="checkbox" value="治療" class="focus-check"> 治療</label>
        <label class="checkbox-label"><input type="checkbox" value="QOL" class="focus-check"> QOL</label>
        <label class="checkbox-label"><input type="checkbox" value="ADL" class="focus-check"> ADL</label>
        <label class="checkbox-label"><input type="checkbox" value="腎機能" class="focus-check"> 腎機能</label>
        <label class="checkbox-label"><input type="checkbox" value="副作用" class="focus-check"> 副作用</label>
      </div>
      <textarea id="focusComment" placeholder="その他の指示やコメント（例：血圧の経過に注目、転倒リスクに注意 等）" rows="2"></textarea>
      <p class="focus-hint">選択した項目を薬歴のA・Pで重点的に評価します</p>
    </div>

    <div class="form-group">
      <label>情報量</label>
      <div class="volume-toggle" id="volumeToggle">
        <button type="button" class="volume-btn" data-volume="50">少なめ</button>
        <button type="button" class="volume-btn active" data-volume="70">標準</button>
        <button type="button" class="volume-btn" data-volume="100">多め</button>
      </div>
      <p class="model-hint" id="volumeHint">標準：要点を絞って簡潔に記載</p>
    </div>

    <button id="saveBtn">保存</button>
    <div id="status" class="status"></div>

    <hr class="divider">

    <div class="prompt-section">
      <label>ログ</label>
      <button id="downloadLogBtn" class="fetch-btn log-btn">ログをダウンロード（JSON）</button>
      <button id="clearLogBtn" class="clear-log-btn">ログをクリア</button>
      <div id="logStatus" class="status"></div>
    </div>

    <hr class="divider">

    <div class="prompt-section">
      <label>プロンプト更新</label>
      <div class="prompt-meta" id="promptMeta">
        <span class="meta-label">バージョン:</span> <span id="promptVersion">未取得</span>
        <br>
        <span class="meta-label">最終取得:</span> <span id="promptFetchedAt">-</span>
      </div>
      <button id="fetchPromptsBtn" class="fetch-btn">最新のプロンプトを読み込む</button>
      <div id="fetchStatus" class="status"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
